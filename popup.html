<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>VOV Radio</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Righteous&display=swap" rel="stylesheet">
</head>
<body>
  <div class="player-container">
    <div class="header">
      <div class="header-left">
        <h1 class="app-title">VOV RADIO</h1>
        <div class="status-indicator">
          <span class="dot" id="status-dot"></span> <span id="status-text">Đang dừng</span>
        </div>
      </div>
      <div class="header-actions">
        <button id="theme-toggle" class="action-btn" title="Đổi giao diện">
           <svg id="theme-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
             <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
           </svg>
        </button>
        <button id="donate-btn" class="action-btn" title="Mời cà phê">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 8h1a4 4 0 0 1 0 8h-1"></path>
            <path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"></path>
            <line x1="6" y1="1" x2="6" y2="4"></line>
            <line x1="10" y1="1" x2="10" y2="4"></line>
            <line x1="14" y1="1" x2="14" y2="4"></line>
          </svg>
        </button>
      </div>
    </div>
    
    <div class="station-selector">
      <select id="channel-select">
        <option value="vov1">VOV1 - Thời sự</option>
        <option value="vov2">VOV2 - Văn hóa</option>
        <option value="vov3">VOV3 - Âm nhạc</option>
        <option value="vov4">VOV4 - Dân tộc</option>
        <option value="vov5">VOV5 - VOV World</option>
        <option value="vov6">VOV6 - Văn học & Nghệ thuật</option>
        <option value="vov247">VOV English 24/7</option>
        <option value="vovgt">VOV Giao Thông</option>
      </select>
    </div>

    <div class="visualizer" id="visualizer">
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
    </div>

    <div class="controls">
      <button id="play-pause-btn" class="btn-play">
        <svg id="icon-play" xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        <svg id="icon-pause" class="hidden" xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
      </button>
    </div>

    <div class="volume-control">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
      <input type="range" id="volume-slider" min="0" max="1" step="0.05" value="0.8">
    </div>
  </div>

  <div id="donate-modal" class="modal-overlay hidden">
    <div class="modal-content">
      <button class="close-btn" id="close-donate-btn">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
      </button>
      
      <h3 style="margin-top:0; margin-bottom: 20px; font-size: 16px; text-align: center;">Mời mình một ly cà phê ☕</h3>
      
      <div id="donate-detail-techcombank" style="display: flex; flex-direction: column; align-items: center; gap: 1rem;">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/7/7c/Techcombank_logo.png/600px-Techcombank_logo.png" style="height: 28px; object-fit: contain; margin-bottom: 5px;" alt="Techcombank" onerror="this.style.display='none'">
        <div style="width: 160px; height: 160px; background: white; padding: 8px; border-radius: 16px; border: 1px solid var(--border); box-shadow: 0 8px 24px rgba(0,0,0,0.08);">
          <img src="assets/qrcode.png" alt="Techcombank QR" style="width: 100%; height: 100%; border-radius: 8px; display: block; object-fit: cover;">
        </div>
        <div style="background: var(--bg-secondary); width: calc(100% - 24px); padding: 12px; border-radius: 12px; border: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; gap: 8px;">
          <div style="font-weight: 700; font-size: 1rem; color: var(--text-primary); letter-spacing: 0.5px;">DO VAN HUY</div>
          <div style="display: flex; align-items: center; justify-content: space-between; width: 100%;">
            <span style="font-size: 1rem; color: var(--text-primary); font-family: monospace; font-weight: 600;">19033386221010</span>
            <button id="donate-copy" data-copy="19033386221010" style="margin-left: 10px; padding: 8px; border: none; background: #E5002015; color: #E50020; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; width: 34px; height: 34px; transition: background 0.2s;" title="Copy">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="js/popup.js"></script>
</body>
</html>
